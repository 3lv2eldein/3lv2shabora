        function openDoor() {
            document.getElementById('doorLeft').classList.add('open');
            document.getElementById('doorRight').classList.add('open');
            document.getElementById('doorLight').classList.add('open');
            document.getElementById('knockBtn').classList.add('hidden');
            const petalsContainer = document.getElementById('petals');
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const petal = document.createElement('div');
                    petal.className = 'petal';
                    petal.style.left = Math.random() * 100 + '%';
                    petal.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    petal.style.animationDelay = Math.random() * 2 + 's';
                    petalsContainer.appendChild(petal);
                    setTimeout(() => petal.remove(), 5000);
                }, i * 200);
            }
            setTimeout(() => {
                document.getElementById('doorSection').style.display = 'none';
                document.getElementById('detailsSection').classList.add('active');
                window.scrollTo(0, 0);
            }, 3500);
        }

            e.preventDefault();
            const formData = new FormData(e.target);
            fetch('https://formspree.io/f/xnqevwdr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
